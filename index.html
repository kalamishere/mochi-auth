<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting Mochi...</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf0f4;
    --warm-tan: #f5c2d4;
    --caramel: #b06080;
    --rust: #e85d8a;
    --deep: #4a1a2e;
    --shadow: rgba(74,26,46,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(160deg, #fdf0f4, #fce4ed);
    font-family: 'Lora', Georgia, serif;
    color: var(--deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
    text-align: center;
    padding: 32px;
  }

  .cat { font-size: 3rem; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { to { transform: translateY(-10px); } }

  h2 {
    font-style: italic;
    color: var(--rust);
    margin: 0;
    font-size: 1.35rem;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--caramel);
    max-width: 360px;
    line-height: 1.8;
  }

  .key-box {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    background: #fff5f8;
    padding: 12px 18px;
    border-radius: 12px;
    word-break: break-all;
    max-width: 420px;
    width: 100%;
    color: var(--deep);
    border: 1.5px solid var(--warm-tan);
    user-select: all;
    cursor: pointer;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .copy-btn {
    padding: 10px 24px;
    background: var(--rust);
    color: white;
    border: none;
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 0 0 #c04070, 0 4px 12px var(--shadow);
  }

  .copy-btn:hover {
    background: #d04478;
    transform: translateY(-1px);
    box-shadow: 0 4px 0 0 #c04070, 0 6px 16px var(--shadow);
  }

  .copy-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 0 #c04070;
  }

  .instructions {
    background: #fff5f8;
    border: 1.5px solid var(--warm-tan);
    border-radius: 14px;
    padding: 16px 20px;
    max-width: 420px;
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--caramel);
    line-height: 2;
    text-align: left;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .instructions b { color: var(--deep); }

  #successContent {
    display: none;
    width: 100%;
    max-width: 420px;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #errorMsg {
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: #c0392b;
  }
</style>
</head>
<body>

<div class="cat" id="catEmoji">🐱</div>
<h2 id="msg">Reading your key...</h2>

<div id="successContent">
  <p class="subtitle">Your Pollinations key — click to copy, then paste it into the game:</p>
  <div class="key-box" id="keyBox" onclick="copyKey()" title="Click to copy"></div>
  <button class="copy-btn" onclick="copyKey()" id="copyBtn">📋 Copy Key</button>
  <div class="instructions">
    <b>How to connect:</b><br>
    1. Copy the key above<br>
    2. Switch back to the Mochi game tab<br>
    3. Paste it into the <b>Step 2</b> box<br>
    4. Click <b>Wake her up!</b>
  </div>
</div>

<p id="errorMsg">No key found — did you cancel? You can close this tab and try again.</p>

<script>
(function() {
  const fullHref = window.location.href;
  const hashIdx  = fullHref.indexOf('#');
  const fragment = hashIdx !== -1 ? fullHref.slice(hashIdx + 1) : '';
  const key      = new URLSearchParams(fragment).get('api_key');

  if (key) {
    document.getElementById('catEmoji').textContent = '😻';
    document.getElementById('msg').textContent = 'You\'re connected! Copy your key below.';

    const box = document.getElementById('keyBox');
    box.textContent = key;

    const successContent = document.getElementById('successContent');
    successContent.style.display = 'flex';

    // Try BroadcastChannel as a bonus (works if game is open in same browser)
    try {
      new BroadcastChannel('mochi_auth').postMessage({ type: 'POLLINATIONS_KEY', key });
    } catch(e) {}

    // Try postMessage to opener
    if (window.opener) {
      try { window.opener.postMessage({ type: 'POLLINATIONS_KEY', key }, '*'); } catch(e) {}
    }

  } else {
    document.getElementById('catEmoji').textContent = '😿';
    document.getElementById('msg').textContent = 'No key found.';
    document.getElementById('errorMsg').style.display = 'block';
  }
})();

function copyKey() {
  const key = document.getElementById('keyBox').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.style.background = '#a8d8c8';
    btn.style.boxShadow = '0 3px 0 0 #80b8a8';
    setTimeout(() => {
      btn.textContent = '📋 Copy Key';
      btn.style.background = 'var(--rust)';
      btn.style.boxShadow = '0 3px 0 0 #c04070, 0 4px 12px var(--shadow)';
    }, 2000);
  }).catch(() => {
    const box = document.getElementById('keyBox');
    const range = document.createRange();
    range.selectNode(box);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}
</script>
</body>
</html>

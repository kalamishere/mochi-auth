<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connecting Mochi...</title>
<style>
  body {
    margin: 0;
    font-family: Georgia, serif;
    background: #faf6f0;
    color: #3d2314;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 20px;
    text-align: center;
    padding: 32px;
  }
  .cat { font-size: 3.5rem; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { to { transform: translateY(-10px); } }
  h2 { font-style: italic; color: #9b5c3a; margin: 0; font-size: 1.4rem; }
  p { font-family: monospace; font-size: 0.8rem; color: #c9956a; margin: 0; max-width: 360px; line-height: 1.7; }
  .key-box {
    font-family: monospace; font-size: 0.8rem;
    background: #e8d5b7; padding: 12px 18px; border-radius: 10px;
    word-break: break-all; max-width: 420px; width: 100%;
    color: #3d2314; border: 1.5px solid #c9956a;
    user-select: all; cursor: pointer;
  }
  .copy-btn {
    padding: 10px 22px; background: #9b5c3a; color: white;
    border: none; border-radius: 10px; font-family: monospace;
    font-size: 0.82rem; cursor: pointer; transition: background 0.2s;
  }
  .copy-btn:hover { background: #c9956a; }
  .instructions {
    background: white; border: 1.5px solid #e8d5b7; border-radius: 12px;
    padding: 16px 20px; max-width: 420px; width: 100%;
    font-family: monospace; font-size: 0.72rem; color: #9b5c3a;
    line-height: 1.8; text-align: left;
  }
  .instructions b { color: #3d2314; }
</style>
</head>
<body>

<div class="cat" id="catEmoji">🐱</div>
<h2 id="msg">Reading your key...</h2>

<div id="successContent" style="display:none;width:100%;max-width:420px;display:none;flex-direction:column;align-items:center;gap:14px;">
  <p>Your Pollinations key — click to copy, then paste it into the game:</p>
  <div class="key-box" id="keyBox" onclick="copyKey()" title="Click to copy"></div>
  <button class="copy-btn" onclick="copyKey()" id="copyBtn">📋 Copy Key</button>
  <div class="instructions">
    <b>How to connect:</b><br>
    1. Copy the key above<br>
    2. Switch back to the Mochi game tab<br>
    3. Paste it into the <b>Step 2</b> box<br>
    4. Click <b>Let's go →</b>
  </div>
</div>

<p id="errorMsg" style="display:none;color:#c0392b;">No key found — did you cancel? You can close this tab and try again.</p>

<script>
(function() {
  // itch.io strips the hash from iframes, but this page loads directly
  // in a real browser tab as the OAuth redirect target, so we can read it.
  const fullHref = window.location.href;
  const hashIdx  = fullHref.indexOf('#');
  const fragment = hashIdx !== -1 ? fullHref.slice(hashIdx + 1) : '';
  const key      = new URLSearchParams(fragment).get('api_key');

  if (key) {
    document.getElementById('catEmoji').textContent = '😻';
    document.getElementById('msg').textContent = 'You\'re connected! Copy your key below.';

    const box = document.getElementById('keyBox');
    box.textContent = key;

    const successContent = document.getElementById('successContent');
    successContent.style.display = 'flex';

    // Try BroadcastChannel as a bonus (works if game is open in same browser)
    try {
      new BroadcastChannel('mochi_auth').postMessage({ type: 'POLLINATIONS_KEY', key });
    } catch(e) {}

    // Try postMessage to opener
    if (window.opener) {
      try { window.opener.postMessage({ type: 'POLLINATIONS_KEY', key }, '*'); } catch(e) {}
    }

  } else {
    document.getElementById('catEmoji').textContent = '😿';
    document.getElementById('msg').textContent = 'No key found.';
    document.getElementById('errorMsg').style.display = 'block';
  }
})();

function copyKey() {
  const key = document.getElementById('keyBox').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.style.background = '#8aad8a';
    setTimeout(() => {
      btn.textContent = '📋 Copy Key';
      btn.style.background = '#9b5c3a';
    }, 2000);
  }).catch(() => {
    // Fallback: select the text
    const box = document.getElementById('keyBox');
    const range = document.createRange();
    range.selectNode(box);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}
</script>
</body>
</html>
